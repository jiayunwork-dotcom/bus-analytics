version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bus-analytics-db
    environment:
      POSTGRES_USER: bususer
      POSTGRES_PASSWORD: buspass123
      POSTGRES_DB: bus_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bususer -d bus_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bus-analytics-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: bususer
      DB_PASSWORD: buspass123
      DB_NAME: bus_analytics
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bus-analytics-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
